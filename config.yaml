name: Necrologi Zona TV
slug: necrologi_zona_tv
version: "0.1.10"
description: Raccoglie necrologi per Orsago, Cordignano, Godega, San Fior e li espone via API.
url: https://github.com/diegobattistuzzi/necrologio
startup: services
boot: auto
init: false
homeassistant_api: true
hassio_api: true
hassio_role: manager  # <--- Questo è cruciale per le API di conversazione
ingress: true
ingress_port: 8099
panel_icon: mdi:newspaper-variant-outline
panel_title: Necrologi Zona TV
arch:
  - aarch64
  - amd64
  - armv7
map:
  - share:rw
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: API HTTP necrologi
options:
  scan_interval_minutes: 60
  max_items_per_source: 80
  save_images: true
  enable_ocr: false
  ocr_only_when_missing: true
  ocr_max_items_per_run: 20
  mqtt_enabled: false
  mqtt_url: mqtt://core-mosquitto:1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_base_topic: necrologi_zona_tv
  mqtt_discovery_prefix: homeassistant
  enable_ai_extraction: false
  ai_agent_id: ""
  ai_only_when_missing: true
  ai_max_items_per_run: 20
  ai_timeout_ms: 30000
  ha_api_url: http://supervisor/core/api
  ha_access_token: ""
  towns:
    - Orsago
    - Cordignano
    - Godega
    - San Fior
    - Mareno di Piave
    - Vazzola
    - Conegliano
    - San Vendemiano
    - Santa Lucia di Piave
    - Codogne
  log_level: info
schema:
  scan_interval_minutes: int(10,1440)
  max_items_per_source: int(10,300)
  save_images: bool
  enable_ocr: bool
  ocr_only_when_missing: bool
  ocr_max_items_per_run: int(1,100)
  mqtt_enabled: bool
  mqtt_url: str
  mqtt_username: str?
  mqtt_password: password?
  mqtt_base_topic: str
  mqtt_discovery_prefix: str
  enable_ai_extraction: bool
  ai_agent_id: str?
  ai_only_when_missing: bool
  ai_max_items_per_run: int(1,100)
  ai_timeout_ms: int(3000,120000)
  ha_api_url: str
  ha_access_token: password?
  towns:
    - str
  log_level: list(trace|debug|info|warn|error)
